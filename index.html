<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./docs/">
  <title>宠物管家 | 项目作品集</title>
  <style>
    :root {
      --bg: #f4f6f3;
      --ink: #131615;
      --muted: #68716b;
      --sage: #c0dfb9;
      --paper: #ffffff;
      --line: #d8ded8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 24% 18%, rgba(192, 223, 185, 0.38), transparent 30%),
        radial-gradient(circle at 80% 22%, rgba(219, 231, 236, 0.55), transparent 26%),
        var(--bg);
      color: var(--ink);
      font-family: "HarmonyOS Sans SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    main {
      width: min(520px, calc(100% - 32px));
      padding: 34px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: inset 0 0 0 1px var(--line), 0 24px 70px rgba(30, 38, 33, 0.1);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      border-radius: 999px;
      background: var(--sage);
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(126, 148, 134, 0.2);
    }
  </style>
</head>
<body>
  <main>
    <h1>正在打开宠物管家作品集</h1>
    <p>如果页面没有自动跳转，请点击下面按钮进入新版动态项目展示页。</p>
    <a href="./docs/">进入作品集</a>
  </main>
</body>
</html>
